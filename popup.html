<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>科目名編集</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: sans-serif;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
      cursor: pointer;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0052a3;
    }
    p {
      font-size: 13px;
      color: #333;
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <p>編集したい科目をページ上でクリックして、新しい名前を設定できます。</p>
  <button id="editBtn">科目名を編集する</button>
  <script src="popup.js"></script>

</html>
